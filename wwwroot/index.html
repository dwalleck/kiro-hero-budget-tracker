<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { margin: 0; }
    h2 { margin-top: 2rem; }
    .label { color: #666; margin: 1rem 0 0; }
    .summary { font-size: 3.2rem; font-weight: 800; color: #b00020; margin: 0.25rem 0 0; font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid #e5e5e5; }
    td.amt { text-align: right; font-variant-numeric: tabular-nums; }
    tr.pending td { color: #999; font-style: italic; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem 1rem; align-items: end; margin-top: 0.5rem; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.85rem; color: #444; }
    input, select, button { padding: 0.45rem; font-size: 1rem; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; font-weight: 600; }
    .row-check { display: flex; align-items: center; gap: 0.4rem; }
    .row-check input { width: auto; }
  </style>
</head>
<body>
  <h1>Budget Tracker</h1>
  <p class="label">Spent this month</p>
  <p class="summary" id="spent">$0.00</p>

  <h2>Transactions</h2>
  <table>
    <thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="amt">Amount</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <h2>Add a transaction</h2>
  <form id="add">
    <label>Amount ($)<input id="amount" type="number" step="0.01" min="0" required /></label>
    <label>Direction
      <select id="direction">
        <option value="out">Money out (expense)</option>
        <option value="in">Money in (income/refund)</option>
      </select>
    </label>
    <label class="full">Description<input id="description" type="text" required placeholder="e.g. Transfer to savings" /></label>
    <label>Category
      <select id="category">
        <option value="">Uncategorized</option>
        <option value="1">Rent</option>
        <option value="2">Groceries</option>
      </select>
    </label>
    <label class="row-check"><input id="pending" type="checkbox" /> Pending (not cleared yet)</label>
    <button class="full" type="submit">Add transaction</button>
  </form>

  <script>
    async function load() {
      const summary = await (await fetch('/summary')).json();
      document.getElementById('spent').textContent = summary.totalSpent;

      const tx = await (await fetch('/transactions')).json();
      document.getElementById('rows').innerHTML = tx.map(t => `
        <tr class="${t.pending ? 'pending' : ''}">
          <td>${t.date}</td>
          <td>${t.description}${t.pending ? ' (pending)' : ''}</td>
          <td>${t.category ?? ''}</td>
          <td class="amt">${t.amount}</td>
          <td>${t.pending ? `<button type="button" class="clear" data-id="${t.id}">Mark cleared</button>` : ''}</td>
        </tr>`).join('');
    }

    document.getElementById('add').addEventListener('submit', async (e) => {
      e.preventDefault();
      const dollars = parseFloat(document.getElementById('amount').value || '0');
      const moneyOut = document.getElementById('direction').value === 'out';
      const amountCents = Math.round(dollars * 100) * (moneyOut ? -1 : 1);
      const category = document.getElementById('category').value;

      await fetch('/transactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amountCents,
          description: document.getElementById('description').value,
          categoryId: category ? parseInt(category, 10) : null,
          isPending: document.getElementById('pending').checked,
        }),
      });
      e.target.reset();
      load();
    });

    document.getElementById('rows').addEventListener('click', async (e) => {
      if (!e.target.classList.contains('clear')) return;
      await fetch(`/transactions/${e.target.dataset.id}/clear`, { method: 'POST' });
      load();
    });

    load();
  </script>
</body>
</html>
